<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Caixa Eletrônico</title>
</head>

<body>
    <div class="container">
        <div class="text-sale">
            <h1>Caixa eletrônico</h1>
            <p>Saldo</p>
            <span class="sale"></span>
        </div>
        <div class="moneys">
            <div class="deposit-box">
                <p>Depósito</p>
                <input class="input-deposit" type="number">
                <section>
                    <button class="deposit-button">Depositar</button>
                </section>
            </div>
            <div class="sakes">
                <p>Saque</p>
                <input class="sake" type="number">
                <section>
                    <button class="remove-button">Sacar</button>
                </section>
            </div>

        </div>
    </div>
</body>
<script src="./script.js"></script>
</html>
